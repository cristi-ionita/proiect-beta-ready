services:
  db:
    image: postgres:16
    container_name: flota_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: flota
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: flota_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.ngrok
    depends_on:
      - db
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ./frontend
    container_name: flota_frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    ports:
      - "3000:3000"
    command: sh -c "npm run build && npm run start -- --hostname 0.0.0.0"

volumes:
  postgres_data: