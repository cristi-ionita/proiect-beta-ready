services:
  db:
    image: postgres:16
    container_name: cars_db
    restart: unless-stopped
    env_file:
      - ./backend/.env.docker
    environment:
      POSTGRES_DB: cars_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cars_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: cars_api
    restart: unless-stopped
    env_file:
      - ./backend/.env.docker
    environment:
      APP_ENV_FILE: .env.docker
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
    container_name: cars_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm run build && npm run start -- --hostname 0.0.0.0"
    env_file:
      - ./frontend/.env.docker

volumes:
  postgres_data: